url: https://pinin4fjords.github.io/shinyngs/

template:
  bootstrap: 5
  bootswatch: cosmo
  opengraph:
    image:
      src: man/figures/logo.png
      alt: "shinyngs hex logo, showing a PCA plot, a volcano plot, and boxplots"

development:
  mode: auto

reference:
- title: Building apps
  desc: >
    Core classes and entry points for assembling an
    ExploratorySummarizedExperimentList and turning it into a Shiny app.
  contents:
  - ExploratorySummarizedExperiment
  - ExploratorySummarizedExperimentList
  - prepare_app
  - eselist_from_yaml
  - eselist_from_config

- title: Reading and validating input
  desc: >
    Helpers for reading matrices, metadata, contrasts and enrichment results
    from files, and validating them for consistency.
  contents:
  - read_contrasts
  - read_differential
  - read_gmt
  - read_matrix
  - read_metadata
  - file_extension
  - guess_separator
  - check_list_is_subset
  - validate_indices
  - validate_inputs
  - validate_or_catch
  - is_valid_positive_integer_vector
  - single_valid_matrix
  - has_slot_data
  - build_enrichment_path
  - choose_grouping_variables

- title: Matrix and statistics utilities
  desc: >
    Functions for transforming, summarising and clustering expression
    matrices.
  contents:
  - bootstrap_median
  - col_geom_means
  - col_medians
  - cond_log2_transform_assays
  - cond_log2_transform_matrix
  - fold_change
  - guess_foldchange_scale
