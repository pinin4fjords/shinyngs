  - validateOrCatch
  - is_valid_positive_integer_vector
  - singleValidMatrix
  - has_slot_data
  - build_enrichment_path
  - chooseGroupingVariables

- title: Matrix and statistics utilities
  desc: >
    Functions for transforming, summarising and clustering expression
    matrices.
  contents:
