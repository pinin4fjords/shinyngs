navbar:
  structure:
    left:  [intro, building-apps, using-extending, reference, news]
    right: [search, github]
  components:
    building-apps:
      text: Building apps
      menu:
      - text: The data model
        href: articles/data-model.html
      - text: Building an app from files and YAML
