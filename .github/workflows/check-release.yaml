# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  pull_request:
    branches: [develop]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.R_CI }}
      R_KEEP_PKG_SOURCE: yes
      TEST_DATA_BASE: "https://raw.githubusercontent.com/nf-core/test-datasets/modules/data/genomics/mus_musculus/rnaseq_expression"
      FEATURE_META_FILE: "SRP254919.gene_meta.tsv"
      SAMPLE_META_FILE: "SRP254919.samplesheet.csv"
      ASSAY_FILE: "SRP254919.salmon.merged.gene_counts.top1000cov.tsv"
      CONTRASTS_FILE: "SRP254919.contrasts.csv"
      DIFFERENTIAL_FILE: "SRP254919.salmon.merged.deseq2.results.tsv"
      TREATMENT_VARIABLE: "treatment"
      REFERENCE_LEVEL: "mCherry"
      TREATMENT_LEVEL: "hND6"

    steps:
      - uses: actions/checkout@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          r-version: '4.4.0'

      - name: Install system libraries required by Rhtslib
        # Per Rhtslib's DESCRIPTION: SystemRequirements: libbz2 & liblzma &
        # libcurl (with header files), GNU make. Normally provided by
        # setup-r-dependencies' own sysreqs resolution, but that step runs
        # after this one (see next step), so install them explicitly here.
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libbz2-dev liblzma-dev zlib1g-dev

      - name: Pre-install Rhtslib directly (works around a pak parallel-install bug)
        run: |
          Rscript -e '
            # setup-r-dependencies (pak) intermittently reports
            # "Failed to install binary package Rhtslib" even though the
            # package actually built and installed correctly - confirmed by
            # running BiocManager::install("Rhtslib") right after a failed
            # pak run and finding it already present and loadable. Rhtslib
            # sets StagedInstall: no (it runs its own Makefile-based htslib
            # build rather than pak/R staged install), which looks to race
            # with pak parallel worker bookkeeping. Installing it here,
            # sequentially and directly, before pak resolves dependencies,
            # sidesteps that: pak will see it already satisfied and skip it.
            if (!requireNamespace("BiocManager", quietly = TRUE)) install.packages("BiocManager")
            BiocManager::install("Rhtslib", update = FALSE, ask = FALSE)
          '

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # Vignette-only Suggests (biomaRt, Gviz, DEXSeq, zhangneurons, devtools,
          # BiocStyle, rmarkdown, rsconnect) are skipped here: CI builds with
          # --no-build-vignettes / checks with --no-vignettes below, and
          # _R_CHECK_FORCE_SUGGESTS_ is false, so they aren't needed. testthat,
          # optparse, withr and shinytest2 (which pulls in chromote) are explicit
          # since the "dependencies" restriction below would otherwise exclude
          # them (they're only Suggests, not Imports).
          extra-packages: any::rcmdcheck, any::testthat, any::optparse, any::withr, any::shinytest2, local::.
          dependencies: 'c("Imports", "Depends", "LinkingTo")'

      - name: Install Chrome for headless shinytest2 tests
        uses: browser-actions/setup-chrome@v1

      - uses: r-lib/actions/check-r-package@v2
        with:
          error-on: '"error"'
          args: 'c("--no-manual", "--as-cran", "--no-examples", "--no-vignettes")'
          build_args: 'c("--no-manual", "--no-build-vignettes")'

      - name: Download test data from nf-core tests data repo
        run: |
          for filename in $CONTRASTS_FILE $FEATURE_META_FILE $SAMPLE_META_FILE $ASSAY_FILE $DIFFERENTIAL_FILE; do
            wget -O $filename ${TEST_DATA_BASE}/$filename
          done

      - name: Run integration scripts (FOM validation, exploratory/differential plots, app build)
        run: |
          pids=()

          ./exec/validate_fom_components.R \
            --sample_metadata $SAMPLE_META_FILE \
            --feature_metadata $FEATURE_META_FILE \
            --assay_files $ASSAY_FILE \
            --contrasts_file $CONTRASTS_FILE \
            --output_directory $(pwd) &
          pids+=($!)

          ./exec/exploratory_plots.R \
            --sample_metadata $SAMPLE_META_FILE \
            --feature_metadata $FEATURE_META_FILE \
            --assay_files $ASSAY_FILE \
            --contrast_variable $TREATMENT_VARIABLE \
            --outdir $(pwd) &
          pids+=($!)

          ./exec/differential_plots.R \
            --differential_file $DIFFERENTIAL_FILE \
            --feature_metadata $FEATURE_META_FILE \
            --reference_level $REFERENCE_LEVEL \
            --treatment_level $TREATMENT_LEVEL \
            --outdir $(pwd) &
          pids+=($!)

          ln -s $DIFFERENTIAL_FILE copied_${DIFFERENTIAL_FILE}
          ./exec/make_app_from_files.R \
            --sample_metadata $SAMPLE_META_FILE \
            --feature_metadata $FEATURE_META_FILE \
            --assay_files $ASSAY_FILE \
            --contrast_file $CONTRASTS_FILE \
            --contrast_stats_assay 1 \
            --differential_results ${DIFFERENTIAL_FILE},copied_${DIFFERENTIAL_FILE} \
            --output_dir $(pwd) &
          pids+=($!)

          status=0
          for pid in "${pids[@]}"; do
            wait "$pid" || status=1
          done
          exit $status

